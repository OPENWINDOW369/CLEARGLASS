name: ci-cd

on:
  push:
    paths: ["clearglassinc-artemis/**"]
  pull_request:
    paths: ["clearglassinc-artemis/**"]

defaults:
  run:
    working-directory: clearglassinc-artemis

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pydantic pytest
      - run: pytest -q
        working-directory: clearglassinc-artemis/apps/ai-python

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
        working-directory: clearglassinc-artemis/apps/api-node
      - run: npm test
        working-directory: clearglassinc-artemis/apps/api-node

  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
      - run: opa check services/policy-engine

  # build -> sign -> push -> Apollo canary -> progressive rollout -> auto-rollback
  # are wired in the deployment environment, not in this stub.
