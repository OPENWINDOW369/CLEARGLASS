version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: artemis
      POSTGRES_PASSWORD: artemis
      POSTGRES_DB: artemis
    ports: ["5432:5432"]
    volumes:
      - ../../data/sql:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api-node:
    build:
      context: ../../apps/api-node
      dockerfile: ../../infra/docker/api-node.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "8080"
    depends_on: [redis]
    ports: ["8080:8080"]

  ai-python:
    build:
      context: ../../apps/ai-python
      dockerfile: ../../infra/docker/ai-python.Dockerfile
    depends_on: [postgres, redis]
