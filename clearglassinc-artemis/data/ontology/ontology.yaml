# Foundry-aligned ontology definition (declarative)
metadata_fields: &common
  - object_id
  - object_type
  - classification        # UNCL | CONF | SECRET | TS
  - coalition_scope       # list, e.g. [US, ALLY_B]
  - need_to_know_tags
  - confidence            # 0.0 - 1.0
  - lineage               # source system, transform job, operator edits
  - valid_from
  - valid_to
  - created_by
  - modified_by
  - provenance_hash
  - policy_binding_id

objects:
  Person:      { fields: *common }
  Organization:{ fields: *common }
  Asset:       { fields: *common }   # vehicle / device / account
  Location:    { fields: *common }
  Signal:      { fields: *common }   # sensor / message / event
  Alert:       { fields: *common }
  Case:        { fields: *common }
  Mission:     { fields: *common }
  ActionPackage:    { fields: *common }
  IntelReport:      { fields: *common }
  PaymentAccount:   { fields: *common }
  SubscriptionContract: { fields: *common }

relationships:
  - { name: ASSOCIATED_WITH, from: Person,        to: Organization }
  - { name: OWNS,            from: Person,        to: Asset }
  - { name: COMMUNICATED_WITH, from: Person,      to: Person }
  - { name: OBSERVED_AT,     from: Asset,         to: Location }
  - { name: TRIGGERED,       from: Signal,        to: Alert }
  - { name: ELEVATED_TO,     from: Alert,         to: Case }
  - { name: SUPPORTS,        from: Case,          to: Mission }
  - { name: RECOMMENDED_FOR, from: ActionPackage, to: Case }
  - { name: PART_OF_CASE,    from: IntelReport,   to: Case }

edge_fields:
  - confidence
  - evidence            # references / bundle
  - observed_at
  - analyst_override_metadata
  - policy_binding_id
